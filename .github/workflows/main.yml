name: CI

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  build-kernel:
    name: Build Kernel
    runs-on: ubuntu-22.04
    steps:
      - name: Build
        uses: wakeupver/kernel_build_action@main
        with:
          kernel-url: https://github.com/LineageOS/android_kernel_xiaomi_sdm845
          kernel-branch: lineage-22.2
          config: vendor/xiaomi/beryllium.config
          arch: arm64
          aosp-gcc: true
          aosp-clang: false
          other-clang-url: https://github.com/kdrag0n/proton-clang.git
          other-clang-branch: master
          ksu: true
          ksu-other: true
          ksu-version: legacy
          ksu-url: https://github.com/KernelSU-Next/KernelSU-Next
          anykernel3: true
